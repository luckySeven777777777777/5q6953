<!DOCTYPE html>
<html lang="my">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Phone List / ဖုန်းနံပါတ်များ</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Noto Sans Myanmar', sans-serif;
            background: #f0f2f5;
            padding: 20px;
            color: #333;
        }
        .container {
            max-width: 1000px;
            margin: 0 auto;
        }
        .header {
            background: #D70F64;
            color: #fff;
            border-radius: 16px;
            padding: 24px 28px;
            margin-bottom: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 12px;
        }
        .header h1 { font-size: 22px; }
        .header .count { font-size: 14px; opacity: 0.85; }
        .toolbar {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }
        .toolbar button {
            padding: 8px 18px;
            border: none;
            border-radius: 8px;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.15s;
        }
        .toolbar button:hover { opacity: 0.85; }
        .btn-refresh { background: rgba(255,255,255,0.2); color: #fff; }
        .btn-export { background: #FFD1E4; color: #D70F64; }
        .btn-clear { background: #ff5252; color: #fff; }

        .card {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 14px;
            min-width: 700px;
        }
        th {
            text-align: left;
            padding: 12px 10px;
            border-bottom: 2px solid #e0e0e0;
            color: #666;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            white-space: nowrap;
        }
        td {
            padding: 12px 10px;
            border-bottom: 1px solid #f0f0f0;
        }
        .name-cell { font-weight: 600; color: #1a1a2e; }
        .phone-cell {
            font-weight: 600;
            font-size: 15px;
            letter-spacing: 0.5px;
            color: #D70F64;
        }
        .feedback-cell { max-width: 200px; font-size: 13px; color: #555; white-space: pre-wrap; word-break: break-word; }
        .time-cell { color: #888; font-size: 12px; white-space: nowrap; }
        .empty {
            text-align: center;
            padding: 60px 20px;
            color: #999;
        }
        .empty .icon { font-size: 48px; margin-bottom: 12px; }

        .qr-section {
            background: #fff;
            border-radius: 16px;
            padding: 20px;
            margin-top: 20px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.06);
        }
        .qr-section h3 { margin-bottom: 12px; font-size: 16px; color: #555; }
        .qr-section img {
            max-width: 220px;
            border-radius: 8px;
            border: 1px solid #eee;
        }
        .qr-section .tip {
            font-size: 12px;
            color: #999;
            margin-top: 10px;
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            background: #333;
            color: #fff;
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 14px;
            opacity: 0;
            transition: opacity 0.3s;
            z-index: 999;
        }
        .toast.show { opacity: 1; }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <div>
                <h1>&#127474;&#127476; foodpanda Myanmar · Registration Data</h1>
                <div class="count" id="totalCount">Loading...</div>
            </div>
            <div class="toolbar">
                <button class="btn-refresh" onclick="loadData()">Refresh / ပြန်တင်မည်</button>
                <button class="btn-export" onclick="exportCSV()">Export CSV</button>
                <button class="btn-clear" onclick="clearData()">Clear All</button>
            </div>
        </div>

        <div class="card">
            <table>
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Name / အမည်</th>
                        <th>Phone / ဖုန်းနံပါတ်</th>
                        <th>Feedback / မှတ်ချက်</th>
                        <th>Time / အချိန်</th>
                    </tr>
                </thead>
                <tbody id="tbody">
                    <tr><td colspan="5" class="empty"><div class="icon">&#128229;</div>Loading... / စောင့်ပါ...</td></tr>
                </tbody>
            </table>
        </div>

        <div class="qr-section">
            <h3>Scan QR Code / QR ကုဒ်ကိုစကင်ဖတ်ပါ</h3>
            <img id="qrImg" src="/qrcode.png" alt="QR Code" onerror="this.style.display='none'">
            <p class="tip" id="qrUrl"></p>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        const tbody = document.getElementById('tbody');
        const totalCount = document.getElementById('totalCount');
        const toast = document.getElementById('toast');
        const qrUrl = document.getElementById('qrUrl');

        qrUrl.textContent = 'Scan URL: ' + window.location.origin + '/';

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2500);
        }

        async function loadData() {
            try {
                const resp = await fetch('/api/phones');
                const data = await resp.json();
                totalCount.textContent = `Total: ${data.total} records / စုစုပေါင်း ${data.total} ခု`;

                if (data.list.length === 0) {
                    tbody.innerHTML = '<tr><td colspan="5" class="empty"><div class="icon">&#128229;</div>No data yet. Share the QR code!<br>ဒေတာမရှိသေးပါ။ QR ကုဒ်ကိုမျှဝေပါ။</td></tr>';
                    return;
                }

                tbody.innerHTML = data.list.map((entry, i) => `
                    <tr>
                        <td>${i + 1}</td>
                        <td class="name-cell">${entry.name || '-'}</td>
                        <td class="phone-cell">+95 ${(entry.phone || '').replace(/^0+/, '')}</td>
                        <td class="feedback-cell">${entry.feedback || '-'}</td>
                        <td class="time-cell">${entry.time || ''}</td>
                    </tr>
                `).join('');
            } catch (err) {
                tbody.innerHTML = '<tr><td colspan="5" class="empty">Error loading data</td></tr>';
            }
        }

        function exportCSV() {
            window.open('/api/phones/export', '_blank');
        }

        async function clearData() {
            if (!confirm('Delete ALL records? This cannot be undone.\nဒေတာအားလုံးဖျက်မှာသေချာပါသလား။')) return;
            try {
                const resp = await fetch('/api/phones/clear', { method: 'POST' });
                if (resp.ok) {
                    showToast('All records cleared / ဒေတာအားလုံးဖျက်ပြီးပါပြီ');
                    loadData();
                }
            } catch (err) {
                showToast('Failed to clear');
            }
        }

        loadData();
        setInterval(loadData, 10000);
    </script>
</body>
</html>
